services:
  - type: web
    name: kraken-addon
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7000
      - key: BASE_URL
        fromService:
          type: web
          name: kraken-addon
          property: host
    autoDeploy: true
