# ============================================================================
# KRAKEN ADDON - DOCKER COMPOSE
# Full stack deployment with Redis cache and monitoring
# ============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Kraken Add-on Server
  # -------------------------------------------------------------------------
  kraken:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kraken-addon
    restart: unless-stopped
    ports:
      - "${PORT:-7000}:7000"
    environment:
      - NODE_ENV=production
      - PORT=7000
      - HOST=0.0.0.0
      - BASE_URL=${BASE_URL:-http://localhost:7000}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kraken-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kraken-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - kraken-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------------------------------------------------------------
  # Caddy Reverse Proxy (optional - for HTTPS)
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: kraken-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - kraken
    networks:
      - kraken-network
    profiles:
      - production

  # -------------------------------------------------------------------------
  # Prometheus (optional - for monitoring)
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: kraken-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - kraken-network
    profiles:
      - monitoring

  # -------------------------------------------------------------------------
  # Grafana (optional - for dashboards)
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: kraken-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - kraken-network
    profiles:
      - monitoring

# -------------------------------------------------------------------------
# Networks
# -------------------------------------------------------------------------
networks:
  kraken-network:
    driver: bridge

# -------------------------------------------------------------------------
# Volumes
# -------------------------------------------------------------------------
volumes:
  redis-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
